services:
  m-coder:
    build: .
    image: m-coder:latest
    container_name: m-coder
    ports:
      - "${SAQ_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SAQ_VENDOR_DIR: /app/vendor
      SAQ_HOST: 0.0.0.0
      SAQ_PORT: 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
